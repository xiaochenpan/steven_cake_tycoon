<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>FirstGame</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
    <div id="loading-screen">
        <div class="loader-ring"></div>
        <h1 class="title-text">CAKE TYCOON</h1>
        
        <div id="color-selection" class="color-container">
            <p class="color-title">Select Your First Factory Color</p>
            <div class="color-row">
                <button class="color-btn interactive" style="background-color: #ec4899;" onclick="selectColor(this, 0)"></button>
                <button class="color-btn interactive" style="background-color: #22d3ee;" onclick="selectColor(this, 1)"></button>
                <button class="color-btn interactive" style="background-color: #16a34a;" onclick="selectColor(this, 2)"></button>
                <button class="color-btn interactive" style="background-color: #c2410c;" onclick="selectColor(this, 3)"></button>
                <button class="color-btn interactive" style="background-color: #facc15;" onclick="selectColor(this, 4)"></button>
                <button class="color-btn interactive" style="background-color: #fed7aa;" onclick="selectColor(this, 5)"></button>
            </div>
        </div>

        <button id="start-btn" class="btn-play interactive hidden" onclick="startGame()">Play Now</button>
    </div>

    <div id="ui-layer">
        <div id="top-ui">
            <!-- Bank Panel -->
            <div class="ui-panel">
                <div class="ui-header">
                    <div class="text-label">Bank</div>
                    <div class="text-label-blue">Factories: <span id="factories-display">1</span></div>
                </div>
                <div class="text-money" id="money-display">$0</div>
            </div>

            <!-- New Backpack Panel -->
            <div class="ui-panel">
                <div class="ui-header">
                    <div class="text-label" style="color: #9333ea;">Backpack</div>
                </div>
                <div class="controls-text" style="margin: 0; font-size: 0.9rem;">Ingredients: <strong id="batter-display" style="color: #b45309;">0</strong></div>
                <div class="controls-text" style="margin: 0; font-size: 0.9rem;">Hand-Baked: <strong id="baked-cakes-display" style="color: #b45309;">0</strong></div>
            </div>

            <button onclick="toggleFullScreen()" class="btn-full interactive">⛶ Fullscreen</button>
        </div>

        <div id="bottom-ui" class="interactive">
            <div class="controls-title">Controls</div>
            <div class="controls-text">WASD to Move | SPACE to Jump</div>
            <div class="controls-text-amber">Click to Lock Cursor | ESC to Unlock</div>
        </div>

        <div id="crosshair" class="crosshair"></div>
    </div>
    <script src='https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
